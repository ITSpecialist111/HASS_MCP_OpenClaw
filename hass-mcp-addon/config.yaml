name: "HASS MCP Server"
description: "Unrestricted MCP control plane for Home Assistant - full Core, Supervisor, OS, Add-on, file, DB, shell, and Docker access."
version: "2.2.0"
slug: "hass_mcp_server"
url: "https://github.com/voska/hass-mcp"
init: false
arch:
  - aarch64
  - amd64
  - armv7
  - i386
startup: services
boot: auto
hassio_api: true
hassio_role: admin
homeassistant_api: true
auth_api: true
docker_api: true
host_pid: true
host_network: true
host_dbus: true
host_ipc: true
privileged:
  - SYS_ADMIN
  - SYS_RAWIO
  - DAC_READ_SEARCH
  - NET_ADMIN
  - NET_RAW
full_access: true
map:
  - addons:rw
  - backup:rw
  - config:rw
  - share:rw
  - ssl:rw
  - media:rw
  - homeassistant_config:rw
  - all_addon_configs:rw
devices:
  - /dev/serial/by-id
  - /dev/ttyUSB0
  - /dev/ttyACM0
ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: "MCP Server (Streamable HTTP + SSE)"
options:
  log_level: "info"
  ha_token: ""
  log_tool_calls: true
schema:
  log_level: "list(trace|debug|info|notice|warning|error|fatal)"
  ha_token: "str?"
  log_tool_calls: "bool?"
name: "HASS MCP Server"
description: "A powerful Model Context Protocol (MCP) server for AI assistants to interact with Home Assistant. Exposes tools, resources, and prompts for entity control, automation management, history, diagnostics, and more."
version: "1.0.0"
slug: "hass_mcp_server"
url: "https://github.com/voska/hass-mcp"
init: false
arch:
  - aarch64
  - amd64
  - armv7
  - i386
startup: services
homeassistant_api: true
hassio_api: true
hassio_role: manager
ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: "MCP Server (Streamable HTTP + SSE)"
options:
  log_level: "info"
  ha_token: ""
schema:
  log_level: "list(debug|info|warning|error)"
  ha_token: "str?"
map:
  - homeassistant_config:ro
